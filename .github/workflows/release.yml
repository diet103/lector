name: Release

# Tag-driven. `git tag v0.1.0 && git push --tags` builds, signs, verifies and publishes.
# Also runnable by hand to rehearse the whole thing without publishing anything.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gradle/actions/wrapper-validation@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: true

      # A tag that disagrees with the APK's own version produces a release nobody can diagnose
      # later, so fail here rather than after publishing.
      - name: Tag must match versionName
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts)
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match versionName $VERSION"
            exit 1
          fi

      # The build silently produces unsigned APKs when no keystore is configured, which is the
      # right behaviour for someone cloning the repo and exactly the wrong thing to publish.
      - name: Restore the signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 is not set — the release would be unsigned."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > lector-release.jks

      - name: Build, lint, test, and sign
        env:
          LECTOR_KEYSTORE_FILE: lector-release.jks
          LECTOR_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          LECTOR_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          LECTOR_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew lint testDebugUnitTest assembleRelease

      - name: Verify every APK is really signed
        run: |
          APKSIGNER=$(ls "$ANDROID_HOME"/build-tools/*/apksigner | sort -V | tail -1)
          for apk in app/build/outputs/apk/release/*.apk; do
            "$APKSIGNER" verify --print-certs "$apk" > /dev/null
            echo "signed: $(basename "$apk")"
          done

      - name: Shred the keystore
        if: always()
        run: rm -f lector-release.jks

      - name: Checksums and release notes
        run: |
          cd app/build/outputs/apk/release
          sha256sum *.apk > SHA256SUMS.txt
          {
            echo "### Which APK do I want?"
            echo
            echo "| File | For |"
            echo "| --- | --- |"
            echo "| \`app-arm64-v8a-release.apk\` | **Almost certainly this one.** Every phone sold in the last several years. |"
            echo "| \`app-armeabi-v7a-release.apk\` | Older 32-bit phones. |"
            echo "| \`app-x86_64-release.apk\` | Emulators and ChromeOS. |"
            echo "| \`app-universal-release.apk\` | If unsure, or if the others refuse to install. Three times the size. |"
            echo
            echo "Android will refuse to install an APK built for the wrong CPU, so a wrong guess"
            echo "fails safely at install time."
            echo
            echo "You need your own [ElevenLabs API key](https://elevenlabs.io/app/developers/api-keys);"
            echo "Lector sets it up on first launch."
            echo
            echo "### SHA-256"
            echo
            echo '```'
            cat SHA256SUMS.txt
            echo '```'
          } > release-notes.md

      - name: Publish the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd app/build/outputs/apk/release
          gh release create "$GITHUB_REF_NAME" \
            --title "Lector $GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            *.apk SHA256SUMS.txt

      # Manual runs stop here: the artifacts are downloadable for a dry run, nothing is published.
      - uses: actions/upload-artifact@v4
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        with:
          name: lector-release-apks
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/SHA256SUMS.txt
          retention-days: 7
